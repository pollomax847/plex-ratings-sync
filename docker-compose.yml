# =============================================================================
# docker-compose.yml — Plex / iTunes / Audio scripts
#
# Deux services :
#   - scripts : lance des commandes ponctuelles (one-shot)
#   - cron    : démon permanent qui remplace les timers systemd
#
# Adapte les chemins des volumes à ton environnement (section x-paths).
# =============================================================================

# Adapte les chemins via le fichier .env (voir docker/.env.example)

services:
  # ---------------------------------------------------------------------------
  # Service à usage ponctuel. Exemples :
  #   docker compose run --rm scripts run python3 itunes/itunes_analyzer.py --stats
  #   docker compose run --rm scripts run ./workflows/plex_daily_workflow.sh
  #   docker compose run --rm scripts shell
  # ---------------------------------------------------------------------------
  scripts:
    build: .
    image: plex-scripts:latest
    container_name: plex-scripts
    environment:
      TZ: Europe/Paris
      PLEX_DB: "/plex/Plug-in Support/Databases/com.plexapp.plugins.library.db"
      AUDIO_LIBRARY: /music
      PLEX_URL: ${PLEX_URL:-http://host.docker.internal:32400}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_POSTER_STYLE_CONFIG: ${PLEX_POSTER_STYLE_CONFIG:-/app/playlists/poster_style.default.json}
    volumes:
      - "${PLEX_CONFIG_HOST:-/var/snap/plexmediaserver/common/Library/Application Support/Plex Media Server}:/plex:ro"
      - "${MUSIC_HOST:-/home/paulceline/Musiques}:/music"
      - "${PLAYLISTS_HOST:-/mnt/MyBook/playlists}:/playlists"
      - "${ITUNES_HOST:-/mnt/MyBook/Musiques/iTunes}:/itunes"
      - "${DATA_HOST:-./docker-data}:/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pas de restart — usage one-shot via `docker compose run --rm scripts ...`
    restart: "no"
    command: ["help"]

  # ---------------------------------------------------------------------------
  # Interface web (tableau de bord Flask + HTMX).
  #   docker compose up -d webui
  #   → http://localhost:${WEBUI_PORT}
  # ---------------------------------------------------------------------------
  webui:
    build: .
    image: plex-scripts:latest
    container_name: plex-scripts-webui
    command: ["run", "gunicorn", "-b", "0.0.0.0:8765", "-w", "1",
              "--chdir", "/app", "--access-logfile", "-", "webui.app:app"]
    restart: unless-stopped
    ports:
      - "${WEBUI_BIND:-127.0.0.1}:${WEBUI_PORT:-8765}:8765"
    environment:
      TZ: Europe/Paris
      PLEX_URL: ${PLEX_URL:-http://host.docker.internal:32400}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_DB: "/plex/Plug-in Support/Databases/com.plexapp.plugins.library.db"
      PLEX_POSTER_STYLE_CONFIG: ${PLEX_POSTER_STYLE_CONFIG:-/app/playlists/poster_style.default.json}
      AUDIO_LIBRARY: /music
      PLAYLISTS_DIR: /playlists
      LOGS_DIR: /data/logs
      WEBUI_TOKEN: ${WEBUI_TOKEN:-}
      WEBUI_ENFORCE_HTTPS: ${WEBUI_ENFORCE_HTTPS:-0}
      WEBUI_COOKIE_SECURE: ${WEBUI_COOKIE_SECURE:-1}
      WEBUI_ALLOW_DOCKER_CONTROL: ${WEBUI_ALLOW_DOCKER_CONTROL:-0}
      ITUNES_XML: /itunes/iTunes Music Library.xml
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-scripts}
    volumes:
      - "${PLEX_CONFIG_HOST:-/var/snap/plexmediaserver/common/Library/Application Support/Plex Media Server}:/plex:ro"
      - "${MUSIC_HOST:-/home/paulceline/Musiques}:/music"
      - "${PLAYLISTS_HOST:-/mnt/MyBook/playlists}:/playlists"
      - "${ITUNES_HOST:-/mnt/MyBook/Musiques/iTunes}:/itunes"
      - "${DATA_HOST:-./docker-data}:/data"
      # Bind-mount du code (dev : pas besoin de rebuild à chaque modif)
      - "./webui:/app/webui:ro"
      - "./ratings:/app/ratings:ro"
      - "./playlists/playlist_detector.py:/app/playlists/playlist_detector.py:ro"
      - "${SONGREC_BIN_HOST:-/usr/bin/songrec}:/usr/local/bin/songrec:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webui_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

  # ---------------------------------------------------------------------------
  # Proxy TLS local pour chiffrer l'accès webui.
  #   docker compose up -d webui webui_tls
  #   → https://localhost:${WEBUI_TLS_PORT}
  # ---------------------------------------------------------------------------
  webui_tls:
    image: caddy:2-alpine
    container_name: plex-scripts-webui-tls
    restart: unless-stopped
    depends_on:
      - webui
    ports:
      - "${WEBUI_TLS_BIND:-127.0.0.1}:${WEBUI_TLS_PORT:-9443}:8443"
    volumes:
      - "./docker/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "webui_tls_data:/data"
      - "webui_tls_config:/config"
    networks:
      - webui_net

  # ---------------------------------------------------------------------------
  # Démon permanent avec crontab embarquée (remplace les timers systemd).
  #   docker compose up -d cron
  #   docker logs -f plex-scripts-cron
  # ---------------------------------------------------------------------------
  cron:
    build: .
    image: plex-scripts:latest
    container_name: plex-scripts-cron
    command: ["cron"]
    # cron doit tourner en root
    user: "0:0"
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      PLEX_DB: "/plex/Plug-in Support/Databases/com.plexapp.plugins.library.db"
      AUDIO_LIBRARY: /music
      PLEX_URL: ${PLEX_URL:-http://host.docker.internal:32400}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_POSTER_STYLE_CONFIG: ${PLEX_POSTER_STYLE_CONFIG:-/app/playlists/poster_style.default.json}
    volumes:
      - "${PLEX_CONFIG_HOST:-/var/snap/plexmediaserver/common/Library/Application Support/Plex Media Server}:/plex:ro"
      - "${MUSIC_HOST:-/home/paulceline/Musiques}:/music"
      - "${PLAYLISTS_HOST:-/mnt/MyBook/playlists}:/playlists"
      - "${DATA_HOST:-./docker-data}:/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  webui_net:
    driver: bridge

volumes:
  webui_tls_data:
  webui_tls_config:
